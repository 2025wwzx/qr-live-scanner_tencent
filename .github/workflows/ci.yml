name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libglib2.0-0 libxkbcommon-x11-0 libzbar0

      - name: Install package
        run: python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest

      - name: Run Ruff
        run: python -m ruff check src tests

      - name: Run mypy
        run: python -m mypy
